<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Daily Activity Tracker + AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      max-width: 760px;
    }

    input {
      padding: 8px;
      margin: 4px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      margin: 4px;
    }

    #out {
      margin-top: 12px;
      white-space: pre-line;
      border: 1px solid #ddd;
      padding: 12px;
      min-height: 40px;
    }

    #aiResult {
      margin-top: 12px;
      white-space: pre-line;
      border: 1px solid #ddd;
      padding: 12px;
      min-height: 40px;
      background: #f7f7f7;
    }
  </style>
</head>
<body>

<h2>Daily Activity Tracker (Data Real)</h2>

<p>Masukkan aktivitas harian Anda, lalu klik <b>Analisis AI</b> untuk mendapatkan kesimpulan.</p>

<label>Aktivitas:</label>
<input id="act" placeholder="contoh: belajar, olahraga, scroll">

<label>Durasi (menit):</label>
<input id="min" type="number" min="1" placeholder="30">

<button id="add">Tambah</button>
<button onclick="analisisAI()">Analisis AI</button>

<p id="sum">Total: 0 menit (0 aktivitas)</p>

<h3>Daftar Aktivitas:</h3>
<div id="out">Belum ada data.</div>

<h3>Hasil Analisis AI:</h3>
<div id="aiResult">Belum dianalisis.</div>

<script>
  let items = [];

  const act = document.getElementById("act");
  const min = document.getElementById("min");
  const add = document.getElementById("add");
  const sum = document.getElementById("sum");
  const out = document.getElementById("out");
  const aiResult = document.getElementById("aiResult");

  function render() {
    let total = 0;
    let text = "";

    for (let i = 0; i < items.length; i++) {
      total += items[i].m;
      text += (i + 1) + ". " + items[i].a + " — " + items[i].m + " menit\n";
    }

    sum.innerText = "Total: " + total + " menit (" + items.length + " aktivitas)";
    out.innerText = items.length ? text : "Belum ada data.";
  }

  add.addEventListener("click", function() {
    const a = act.value.trim();
    const m = Number(min.value);

    if (!a || !Number.isFinite(m) || m < 1) {
      alert("Aktivitas dan durasi harus diisi dengan benar.");
      return;
    }

    items.push({ a: a, m: Math.round(m) });

    act.value = "";
    min.value = "";
    act.focus();

    render();
  });

  async function analisisAI() {
    if (items.length === 0) {
      aiResult.innerText = "Tidak ada data aktivitas untuk dianalisis.";
      return;
    }

    aiResult.innerText = "Sedang menganalisis...";

    const daftar = items.map(function(item, i) {
      return (i + 1) + ". " + item.a + " - " + item.m + " menit";
    }).join("\n");

    try {
      const response = await fetch("https://activity-ai-backend.vercel.app/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          activities: daftar
        })
      });

      const data = await response.json();

      if (data.result) {
        aiResult.innerText = data.result;
      } else if (data.error) {
        aiResult.innerText = "Error: " + data.error;
      } else {
        aiResult.innerText = "Tidak ada hasil analisis.";
      }

    } catch (error) {
      aiResult.innerText = "Gagal menghubungi AI. Pastikan backend Vercel sudah aktif.";
    }
  }

  render();
</script>

</body>
</html>
